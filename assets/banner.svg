<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Threat Intelligence Dossier header">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a5f" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3b82c4"/>
      <stop offset="1" stop-color="#1e3a5f" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16243d" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.5"/>

  <!-- corner registration marks -->
  <g stroke="#3b82c4" stroke-width="2" opacity="0.7">
    <path d="M40 40h28M40 40v28"/>
    <path d="M1160 40h-28M1160 40v28"/>
    <path d="M40 260h28M40 260v-28"/>
    <path d="M1160 260h-28M1160 260v-28"/>
  </g>

  <!-- classification banner -->
  <text x="600" y="74" text-anchor="middle" fill="#5b7da8" font-family="'Courier New',monospace" font-size="15" letter-spacing="7">CONFIDENTIAL // THREAT INTELLIGENCE // ANALYST EYES ONLY</text>

  <line x1="120" y1="96" x2="1080" y2="96" stroke="url(#rule)" stroke-width="1.5"/>

  <!-- title -->
  <text x="600" y="168" text-anchor="middle" fill="#e8eef7" font-family="Georgia,'Times New Roman',serif" font-size="56" font-weight="700" letter-spacing="2">THREAT INTELLIGENCE DOSSIER</text>

  <text x="600" y="206" text-anchor="middle" fill="#7d9bc1" font-family="'Courier New',monospace" font-size="17" letter-spacing="4">INCIDENT RESPONSE · DIGITAL FORENSICS · MALWARE ANALYSIS</text>

  <line x1="120" y1="232" x2="1080" y2="232" stroke="url(#rule)" stroke-width="1.5"/>

  <!-- footer meta -->
  <text x="120" y="262" fill="#5b7da8" font-family="'Courier New',monospace" font-size="13">FILE: DFIR-ANALYST</text>
  <text x="600" y="262" text-anchor="middle" fill="#5b7da8" font-family="'Courier New',monospace" font-size="13">STATUS: ACTIVE</text>
  <text x="1080" y="262" text-anchor="end" fill="#5b7da8" font-family="'Courier New',monospace" font-size="13">CLEARANCE: VERIFIED</text>
</svg>
